services:

  # ─── Base de datos PostgreSQL 17 ─────────────────────────────────────────────
  db:
    image: postgres:17-alpine
    container_name: smart-chef-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: smart_chef_user
      POSTGRES_PASSWORD: smart_chef_pass
      POSTGRES_DB: smart_chef_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smart_chef_user -d smart_chef_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend Node.js + Express ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: smart-chef-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://smart_chef_user:smart_chef_pass@db:5432/smart_chef_db?schema=public
      JWT_SECRET: ${JWT_SECRET:-cambia_este_secreto_en_produccion}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 3000
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "3000:3000"
    volumes:
      # Monta el código fuente para desarrollo (hot reload con ts-node-dev)
      - ./backend:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  # ─── Frontend Vue 3 + Vite ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: smart-chef-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      LAUNCH_EDITOR: code

volumes:
  postgres_data:
